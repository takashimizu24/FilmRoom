services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
      - dbdata:/app/prisma
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - DATABASE_URL=file:./dev.db

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  uploads:
  dbdata:
  caddy_data:
  caddy_config:
